apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  labels:
    app: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
      - name: blog
        image: blog.pablogeorge.org:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: blog-secrets
              key: session-secret
        - name: NODE_ENV
          value: "production"
        - name: SQLITE_PATH
          value: "/data/blog.db"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: blog-data
---
apiVersion: v1
kind: Service
metadata:
  name: blog
spec:
  selector:
    app: blog
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blog-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: blog-secrets
type: Opaque
stringData:
  session-secret: change-me-to-secure-random-string
