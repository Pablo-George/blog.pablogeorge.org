apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  labels:
    app: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
      - name: blog
        image: ghcr.io/pablo-george/blog.pablogeorge.org:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: blog-secrets
              key: session-secret
        - name: INVITE_CODE
          valueFrom:
            secretKeyRef:
              name: blog-secrets
              key: invite-code
        - name: NODE_ENV
          value: "production"
        - name: SQLITE_PATH
          value: "/data/blog.db"
        - name: UPLOADS_PATH
          value: "/data/uploads"
        - name: PORT
          value: "3000"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: blog-data
---
apiVersion: v1
kind: Service
metadata:
  name: blog
spec:
  selector:
    app: blog
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blog-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
